  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      overflow-x: hidden;
      background: #0a0f1e;
    }

    #root {
      min-height: 100vh;
    }

    .page-loader-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 50%, rgba(56, 189, 248, 0.2) 0%, rgba(56, 189, 248, 0.07) 30%, transparent 63%),
        radial-gradient(circle at 50% 50%, rgba(14, 116, 144, 0.2) 0%, transparent 78%),
        #0a0f1e;
    }

    .page-loader-mark {
      position: relative;
      z-index: 2;
      display: grid;
      place-items: center;
    }

    .page-loader-aura,
    .page-loader-ring {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate3d(-50%, -50%, 0);
      border-radius: 999px;
      pointer-events: none;
    }

    .page-loader-aura {
      width: min(420px, 82vw);
      aspect-ratio: 1;
      background: radial-gradient(circle, rgba(56, 189, 248, 0.24) 0%, rgba(14, 116, 144, 0.12) 40%, transparent 70%);
      filter: blur(2px);
    }

    .page-loader-ring {
      width: min(290px, 60vw);
      aspect-ratio: 1;
      border: 1px solid rgba(125, 211, 252, 0.15);
      border-top-color: rgba(56, 189, 248, 0.8);
      border-right-color: rgba(14, 116, 144, 0.4);
      animation: loader-spin 1.1s linear infinite;
    }

    .page-loader-logo {
      position: relative;
      z-index: 3;
      display: block;
      width: min(220px, 48vw);
      height: auto;
      filter: drop-shadow(0 10px 24px rgba(6, 16, 34, 0.35));
    }

    @keyframes loader-spin {
      to {
        transform: translate3d(-50%, -50%, 0) rotate(360deg);
      }
    }
  </style>
  <script type="application/ld+json">
      {

<body>
  <div class="page-loader-overlay" id="global-splash">
    <div class="page-loader-mark">
      <div class="page-loader-aura"></div>
      <div class="page-loader-ring"></div>
      <img class="page-loader-logo" src="/logo-trimitra.webp" alt="Trimitra" />
    </div>
  </div>

  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>

  <script>
    // Fade out splash screen when React mounts and window loads
    window.addEventListener('load', () => {
      const splash = document.getElementById('global-splash');
      if (splash) {
        // Beri sedikit jeda agar animasi cincin sempat berputar dengan mulus
        setTimeout(() => {
          splash.classList.add('is-exiting');
          // Hapus dari DOM setelah transisi opacity selesai (0.8s + delay 0.4s)
          setTimeout(() => splash.remove(), 1200);
        }, 300);
      }
    });
  </script>
</body>
